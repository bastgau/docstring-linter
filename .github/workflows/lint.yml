name: Lint

on:
  workflow_call:
  workflow_dispatch:

env:
  GROUP: "github-src"

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v7
        name: Git Checkout

      - uses: actions/setup-python@v6
        name: Install Python ${{ vars.PYTHON_VERSION }}
        with:
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev --group ${{ env.GROUP }}

      - name: Install dotenv-linter
        run: curl -sSfL https://raw.githubusercontent.com/dotenv-linter/dotenv-linter/master/install.sh | sudo sh -s -- -b /usr/local/bin v4.0.0

      - uses: j178/prek-action@v2
        name: Execute Prek on push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          extra-args: --group ${{ env.GROUP }} --all-files

      - uses: j178/prek-action@v2
        name: Execute Prek on pull_request
        if: github.event_name == 'pull_request'
        with:
          extra-args: --group ${{ env.GROUP }} --files origin/${{ github.base_ref }}..HEAD
