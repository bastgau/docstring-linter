name: Main - Publish Release
run-name: Publish Release ${{ github.ref_name }}

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.*"

permissions:
  contents: read

jobs:
  lint:
    uses: ./.github/workflows/lint.yml
    name: Lint

  tests:
    needs: lint
    uses: ./.github/workflows/tests.yml
    name: Tests
    secrets: inherit

  guard:
    needs: tests
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    name: Guard
    steps:
      - uses: actions/checkout@v7
        name: Git Checkout
        with:
          fetch-depth: 0

      - name: Check branch for stable release
        run: |
          BRANCH=$(git branch -r --contains HEAD | grep 'origin/main' | tr -d ' ')
          if [ -z "$BRANCH" ]; then
            echo "Stable releases must be tagged from main."
            exit 1
          fi

  build:
    needs: [tests, guard]
    runs-on: ubuntu-latest
    name: Build
    steps:
      - uses: actions/checkout@v7
        name: Git Checkout
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set version from tag
        run: uv version ${{ github.ref_name }}

      - name: Build package
        run: uv build

      - name: Upload distributions
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  github-publish:
    needs: build
    runs-on: ubuntu-latest
    name: Publish to GitHub
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        name: Git Checkout
        with:
          fetch-depth: 0

      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Get last stable tag
        id: last_stable
        if: ${{ !contains(github.ref_name, '-') }}
        run: |
          LAST=$(git tag --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sed -n '2p')
          echo "tag=$LAST" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          PREVIOUS=${{ steps.last_stable.outputs.tag }}
          if [ -z "$PREVIOUS" ]; then
            LOG=$(git log --pretty=format:"- %s" HEAD)
            COMPARE="https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}"
          else
            LOG=$(git log --pretty=format:"- %s" ${PREVIOUS}..HEAD)
            COMPARE="https://github.com/${{ github.repository }}/compare/${PREVIOUS}...${{ github.ref_name }}"
          fi
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$LOG" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "**Full Changelog**: ${COMPARE}" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        run: |
          STATUS=$(gh api repos/${{ github.repository }}/releases/tags/${{ github.ref_name }} -o /dev/null -w "%{http_code}" 2>/dev/null || echo "404")
          echo "exists=$( [ "$STATUS" = "200" ] && echo true || echo false )" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        uses: softprops/action-gh-release@v3
        with:
          name: Release ${{ github.ref_name }}
          files: |
            dist/*.whl
            dist/*.tar.gz
          body: ${{ steps.changelog.outputs.body }}
          prerelease: ${{ contains(github.ref_name, '-') }}

  pypi-publish:
    needs: build
    if: ${{ !contains(github.ref_name, '-') }}
    runs-on: ubuntu-latest
    name: Publish to PyPI
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Publish to PyPI
        run: uv publish --trusted-publishing always
