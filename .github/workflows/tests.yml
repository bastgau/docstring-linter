name: Tests

on:
  workflow_call:
  workflow_dispatch:

env:
  GROUP: "github-tests"

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Tests
    steps:
      - uses: actions/checkout@v7
        name: Git Checkout

      - uses: actions/setup-python@v6
        name: Install Python ${{ vars.PYTHON_VERSION }}
        with:
          python-version: ${{ vars.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --no-dev --group ${{ env.GROUP }}

      - uses: j178/prek-action@v2
        name: Execute Prek on push
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        with:
          extra-args: --group ${{ env.GROUP }} --all-files

      - uses: j178/prek-action@v2
        name: Execute Prek on pull_request
        if: github.event_name == 'pull_request'
        with:
          extra-args: --group ${{ env.GROUP }} --files origin/${{ github.base_ref }}..HEAD

      - uses: codecov/codecov-action@v7
        name: Upload coverage to Codecov
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - uses: actions/upload-artifact@v7
        name: Upload coverage report as artifact
        with:
          name: coverage-report
          path: coverage.xml
