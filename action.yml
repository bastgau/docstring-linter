name: Docstring Linter
description: Validate Python docstrings against style conventions.
author: bastgau

inputs:
  paths:
    description: Files or directories to lint.
    required: false
    default: src/
  format:
    description: Output format (text, json, github-annotations).
    required: false
    default: github-annotations
  extra-args:
    description: Additional arguments passed to docstring-linter.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Install docstring-linter
      shell: bash
      run: pip install --quiet ${{ github.action_path }}

    - name: Run docstring-linter
      shell: bash
      run: docstring-linter ${{ inputs.paths }} --format ${{ inputs.format }} ${{ inputs.extra-args }}
